# ─────────────────────────────────────────
# A3IP Manifest
# Generated by A3IP Creator on 2026-05-12
# ─────────────────────────────────────────

a3ip: "1.1"
min_a3ip_spec: "1.9"
latest_change: 2026-05-21
name: "a3ip-creator"
version: "2.0.0"
description: >
  A Cowork skill and supporting Python scripts that guide an AI through authoring a new A3IP package from scratch. Conducts a structured intake conversation, generates the complete package directory, runs completeness validation, and produces the distributable bundle.
author: "Maksym Prydorozhko <maksym.prydorozhko@gmail.com>"
license: "Apache-2.0"

# ─────────────────────────────────────────
# Components
# ─────────────────────────────────────────

components:
  skills:
    - path: components/skills/a3ip-creator
      description: "Guides the AI through authoring a new A3IP package from scratch in seven phases: Read Spec, Detect Platform, Intake, Scaffold, Validate, Build, and Version."

  artifacts: []

  protocols:
    - path: components/protocols/create-package.md
      description: "Guides through creating a new A3IP package from scratch: intake conversation, scaffold, validate, and build."
    - path: components/protocols/cut-version.md
      description: "Cuts a new package version: bumps manifest, prepends changelog entry, validates, and rebundles."

  prompts: []

  scripts:
    # Scripts follow a primary-plus-adapters pattern.
    # 'any' platform = Python cross-platform default.
    # 'windows' platform = PowerShell adapter in adapters/windows/scripts/.

    - key: scaffold
      description: "Generates a complete A3IP package directory from an intake.json file."
      parameters: ["intake_json", "output_dir"]
      implementations:
        - file: scripts/scaffold.py
          platform: any



    - key: zip_package
      description: "Generates a .a3ip.zip archive from a package directory for human file transfer."
      parameters: ["package_dir", "output_path"]
      implementations:
        - file: scripts/zip_package.py
          platform: any

    - key: sync
      description: "Detects changes in a package directory since the last bundle. Reports modified/added/deleted files, suggests a semver bump type, and writes a sync report for new_version.py to consume."
      parameters: ["package_dir"]
      implementations:
        - file: scripts/sync.py
          platform: any

    - key: new_version
      description: "Cuts a new package version: bumps version in manifest.yaml, updates latest_change, and prepends a changelog entry to CHANGELOG.md. Auto-populates ### Files changed from the sync report if present."
      parameters: ["package_dir", "new_version"]
      implementations:
        - file: scripts/new_version.py
          platform: any

# ─────────────────────────────────────────
# External dependencies
# ─────────────────────────────────────────

dependencies:
  mcp: []

  tools:
    - name: a3ip
      version: ">=1.4.0"
      required: true
      purpose: "Runs validate (Phase 4) and bundle (Phase 5). v1.4.0 declares __spec_version__ 1.9, implements Checks 11/12/13 (adapter outcome coverage, INSTALL.md tier shape, adapter knowledge-shape), and adds the `a3ip platforms` command used by Phase 0.5 platform context detection."
      install: "pip install --upgrade a3ip"
    - name: python
      version: ">=3.9"
      required: true
      purpose: "Runs all Creator scripts (scaffold, validate, bundle, zip, new_version)."
    - name: pyyaml
      version: "any"
      required: false
      purpose: "Improves manifest parsing accuracy in validate.py."
      fallback: "validate.py includes a minimal regex-based YAML parser that handles all required fields without PyYAML."

# ─────────────────────────────────────────
# Configuration schema
# Values collected during installation wizard.
# Referenced as {{config.<key>}} in protocols, prompts, and scripts.
# ─────────────────────────────────────────

configuration:
  - key: install_dir
    label: "Installation directory"
    description: "Directory where a3ip-creator's installed.json and runtime state will be stored. Defaults to the platform convention (~/.claude/packages/a3ip-creator/ on Cowork / Claude Code)."
    type: string
    required: true
    default: "~/.claude/packages/a3ip-creator/"
    placeholder: "~/.claude/packages/a3ip-creator/"
    when: before

  # No configuration required.

# ─────────────────────────────────────────
# Platform compatibility
# ─────────────────────────────────────────

platforms:
  tested:
    - cowork
    - claude-code
    - codex
    - cursor
